name: Build Java Lib
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      isNightly:
        type: boolean
        required: true
        default: false
env:
  PIP_BREAK_SYSTEM_PACKAGES: 1

jobs:
  build-linux-java-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/java_api

      - name: Install uv
        run: python3 -m pip install uv

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install packaging
          python3 update-nightly-build-version.py
        working-directory: scripts

      - name: Build Java lib for Linux
        run: |
          make GEN=Ninja java

      - uses: actions/upload-artifact@v4
        with:
          name: java-lib-linux-x86_64
          path: tools/java_api/build/liblbug_java_native*

  build-linux-java-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/java_api

      - name: Install uv
        run: python3 -m pip install uv

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install packaging
          python3 update-nightly-build-version.py
        working-directory: scripts

      - name: Build Java lib for Linux
        run: make GEN=Ninja java

      - uses: actions/upload-artifact@v4
        with:
          name: java-lib-linux-aarch64
          path: tools/java_api/build/liblbug_java_native*

  build-mac-java-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/java_api

      - name: Install uv
        run: pip3 install uv

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install packaging
          python3 update-nightly-build-version.py
        working-directory: scripts

      - name: Build Java lib for Apple Silicon
        run: |
          arch -arm64 env JAVA_HOME=$(/usr/libexec/java_home) make GEN=Ninja java
        env:
          MACOSX_DEPLOYMENT_TARGET: 13.3
          ARCHFLAGS: "-arch arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: java-lib-osx-arm64
          path: tools/java_api/build/liblbug_java_native*

  build-windows-java:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update submodules
        run: git submodule update --init --recursive tools/java_api

      - name: Install uv
        run: pip3 install uv

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        shell: bash
        run: |
          uv venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          uv pip install packaging
          python3 update-nightly-build-version.py
        working-directory: ./scripts

      - name: Build Java lib for Windows
        shell: cmd
        run: |
          powershell.exe -Command "Add-MpPreference -ExclusionPath '${{ github.workspace }}'"
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          make GEN=Ninja java

      - uses: actions/upload-artifact@v4
        with:
          name: java-lib-win-x86_64
          path: tools/java_api/build/liblbug_java_native*